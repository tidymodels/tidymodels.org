on:
  schedule:
    - cron: "0 12 * * 1-5"  # weekdays at 4am Pacific (UTC-8)
  workflow_dispatch:
    inputs:
      packages:
        description: "Space-separated package names to force re-render, or '--all' to re-render everything (optional)"
        required: false

name: Check CRAN releases and re-render

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      updated_packages: ${{ steps.check.outputs.updated_packages }}
      has_updates: ${{ steps.check.outputs.has_updates }}
      version_changes: ${{ steps.check.outputs.version_changes }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install jsonlite
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: any::jsonlite

      - name: Check for CRAN updates
        id: check
        shell: Rscript {0}
        run: |
          library(jsonlite)

          write_output <- function(...) {
            cat(..., file = Sys.getenv("GITHUB_OUTPUT"), append = TRUE)
          }

          recorded <- jsonlite::read_json("_versions.json", simplifyVector = TRUE)

          # Allow manual override via workflow_dispatch input
          manual <- trimws("${{ github.event.inputs.packages }}")
          if (nzchar(manual)) {
            if (manual == "--all") {
              cat("Manual override: re-rendering all pages\n")
              write_output("updated_packages=--all\n")
              write_output("has_updates=true\n")
              write_output("version_changes<<EOF\n- (all pages, manual trigger)\nEOF\n")
            } else {
              pkgs <- trimws(strsplit(manual, " ")[[1]])
              pkgs <- pkgs[nzchar(pkgs)]
              cat("Manual override for packages:", paste(pkgs, collapse = ", "), "\n")
              changes <- paste0("- ", pkgs, ": ", recorded[pkgs], " (manual trigger)")
              write_output(sprintf("updated_packages=%s\n", paste(pkgs, collapse = " ")))
              write_output("has_updates=true\n")
              write_output(sprintf("version_changes<<EOF\n%s\nEOF\n", paste(changes, collapse = "\n")))
            }
            quit(save = "no")
          }

          pkgs <- names(recorded)

          # Query CRAN for current versions
          db <- available.packages(repos = "https://cloud.r-project.org")
          cran_versions <- setNames(
            ifelse(pkgs %in% rownames(db), db[pkgs[pkgs %in% rownames(db)], "Version"], NA),
            pkgs
          )

          updated <- pkgs[!is.na(cran_versions) & package_version(cran_versions[pkgs]) != package_version(unlist(recorded[pkgs]))]

          if (length(updated) == 0) {
            cat("No package updates found.\n")
            write_output("has_updates=false\n")
          } else {
            cat("Updated packages:", paste(updated, collapse = ", "), "\n")
            changes <- paste0("- ", updated, ": ", recorded[updated], " → ", cran_versions[updated])
            write_output(sprintf("updated_packages=%s\n", paste(updated, collapse = " ")))
            write_output("has_updates=true\n")
            write_output(sprintf("version_changes<<EOF\n%s\nEOF\n", paste(changes, collapse = "\n")))
          }

  rerender:
    needs: check
    if: needs.check.outputs.has_updates == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: any::jsonlite any::yaml any::here any::cli any::pak

      - name: Cache R library
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-lib-${{ runner.os }}-${{ needs.check.outputs.updated_packages }}
          restore-keys: r-lib-${{ runner.os }}-

      - name: Install packages for affected pages
        run: Rscript install_for_packages.R ${{ needs.check.outputs.updated_packages }}

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Re-render affected pages
        id: render
        run: Rscript re-render-package.R ${{ needs.check.outputs.updated_packages }}

      - name: Open issue on render failure
        if: failure() && steps.render.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Automated re-render failed (${{ needs.check.outputs.updated_packages }}) ${{ steps.date.outputs.date }}" \
            --label "automated re-render,bug" \
            --body "The automated re-render triggered by a CRAN update failed.

          **Version changes:**
          ${{ needs.check.outputs.version_changes }}

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          One or more pages failed to render. The freeze cache for those pages has been cleared but not repopulated — a manual re-render may be needed. Check the workflow run above for the full error output."

      - name: Update _versions.json
        if: success()
        shell: Rscript {0}
        run: source("make_versions.R")

      - name: Update package_map.json
        if: success()
        run: Rscript make_package_map.R

      - name: Open pull request
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "cran-rerender/${{ github.run_id }}"
          commit-message: "re-render pages after CRAN update: ${{ needs.check.outputs.updated_packages }}"
          title: "Re-render (${{ needs.check.outputs.updated_packages }}) ${{ steps.date.outputs.date }}"
          body: |
            Automated re-render triggered by CRAN update.

            **Version changes:**
            ${{ needs.check.outputs.version_changes }}

            Please review the rendered output changes before merging.
          labels: "automated re-render"
