on:
  schedule:
    - cron: "0 12 * * 1-5"  # weekdays at 4am Pacific (UTC-8)
  workflow_dispatch:
    inputs:
      packages:
        description: "Space-separated package names to force re-render, or '--all' to re-render everything (optional)"
        required: false

name: Check CRAN releases and re-render

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      updated_packages: ${{ steps.check.outputs.updated_packages }}
      pages: ${{ steps.check.outputs.pages }}
      has_updates: ${{ steps.check.outputs.has_updates }}
      version_changes: ${{ steps.check.outputs.version_changes }}
      date: ${{ steps.check.outputs.date }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install jsonlite
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: any::jsonlite

      - name: Check for CRAN updates
        id: check
        shell: Rscript {0}
        run: |
          library(jsonlite)

          write_output <- function(...) {
            cat(..., file = Sys.getenv("GITHUB_OUTPUT"), append = TRUE)
          }

          recorded <- jsonlite::read_json("_versions.json", simplifyVector = TRUE)
          pkg_map  <- jsonlite::read_json("package_map.json")

          resolve_pages <- function(pkgs) {
            if (identical(pkgs, "--all")) {
              pages <- sort(unique(unlist(pkg_map, use.names = FALSE)))
            } else {
              known <- intersect(pkgs, names(pkg_map))
              pages <- sort(unique(unlist(pkg_map[known], use.names = FALSE)))
            }
            paste(pages, collapse = " ")
          }

          write_output(sprintf("date=%s\n", format(Sys.Date(), "%Y-%m-%d")))

          # Allow manual override via workflow_dispatch input
          manual <- trimws("${{ github.event.inputs.packages }}")
          if (nzchar(manual)) {
            if (manual == "--all") {
              cat("Manual override: re-rendering all pages\n")
              write_output("updated_packages=--all\n")
              write_output(sprintf("pages=%s\n", resolve_pages("--all")))
              write_output("has_updates=true\n")
              write_output("version_changes<<EOF\n- (all pages, manual trigger)\nEOF\n")
            } else {
              pkgs <- trimws(strsplit(manual, " ")[[1]])
              pkgs <- pkgs[nzchar(pkgs)]
              cat("Manual override for packages:", paste(pkgs, collapse = ", "), "\n")
              changes <- paste0("- ", pkgs, ": ", recorded[pkgs], " (manual trigger)")
              write_output(sprintf("updated_packages=%s\n", paste(pkgs, collapse = " ")))
              write_output(sprintf("pages=%s\n", resolve_pages(pkgs)))
              write_output("has_updates=true\n")
              write_output(sprintf("version_changes<<EOF\n%s\nEOF\n", paste(changes, collapse = "\n")))
            }
            quit(save = "no")
          }

          pkgs <- names(recorded)

          # Query CRAN for current versions
          db <- available.packages(repos = "https://cloud.r-project.org")
          cran_versions <- setNames(
            ifelse(pkgs %in% rownames(db), db[pkgs[pkgs %in% rownames(db)], "Version"], NA),
            pkgs
          )

          updated <- pkgs[!is.na(cran_versions) & package_version(cran_versions[pkgs]) != package_version(unlist(recorded[pkgs]))]

          if (length(updated) == 0) {
            cat("No package updates found.\n")
            write_output("has_updates=false\n")
          } else {
            cat("Updated packages:", paste(updated, collapse = ", "), "\n")
            changes <- paste0("- ", updated, ": ", recorded[updated], " → ", cran_versions[updated])
            write_output(sprintf("updated_packages=%s\n", paste(updated, collapse = " ")))
            write_output(sprintf("pages=%s\n", resolve_pages(updated)))
            write_output("has_updates=true\n")
            write_output(sprintf("version_changes<<EOF\n%s\nEOF\n", paste(changes, collapse = "\n")))
          }

  rerender:
    needs: check
    if: needs.check.outputs.has_updates == 'true'
    uses: ./.github/workflows/rerender-and-pr.yml
    secrets: inherit
    with:
      pages: ${{ needs.check.outputs.pages }}
      packages: ${{ needs.check.outputs.updated_packages }}
      cache-key-suffix: cran
      pr-title: "Re-render (${{ needs.check.outputs.updated_packages }}) ${{ needs.check.outputs.date }}"
      pr-context: |
        Automated re-render triggered by CRAN update.

        **Version changes:**
        ${{ needs.check.outputs.version_changes }}
      issue-title: "Automated re-render failed (${{ needs.check.outputs.updated_packages }}) ${{ needs.check.outputs.date }}"
      issue-body: |
        The automated re-render triggered by a CRAN update failed.

        **Version changes:**
        ${{ needs.check.outputs.version_changes }}

        One or more pages failed to render. The freeze cache for those pages has been cleared but not repopulated — a manual re-render may be needed.
      update-metadata: true
