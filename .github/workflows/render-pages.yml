on:
  workflow_dispatch:
    inputs:
      pages:
        description: "Space-separated .qmd page paths to render (e.g. learn/models/parsnip-nnet/index.qmd)"
        required: true

name: Render specific pages

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.extract.outputs.packages }}
      date: ${{ steps.date.outputs.date }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Extract R packages from page YAML
        id: extract
        shell: Rscript {0}
        run: |
          pages <- strsplit(trimws("${{ github.event.inputs.pages }}"), "\\s+")[[1]]
          pkgs <- character()
          for (p in pages) {
            lines <- tryCatch(readLines(p, warn = FALSE), error = function(e) {
              message("Warning: could not read ", p, ": ", e$message)
              character()
            })
            if (length(lines) == 0 || lines[1] != "---") next
            end <- which(lines[-1] == "---")[1] + 1L
            if (is.na(end)) next
            front <- lines[seq(2, end - 1)]
            in_rpkgs <- FALSE
            for (line in front) {
              if (grepl("^r-packages:", line)) {
                in_rpkgs <- TRUE
              } else if (in_rpkgs && grepl("^\\s+-\\s+\\S", line)) {
                pkgs <- c(pkgs, trimws(sub("^\\s*-\\s*", "", line)))
              } else if (in_rpkgs && nzchar(line) && !grepl("^\\s", line)) {
                in_rpkgs <- FALSE
              }
            }
          }
          result <- paste(sort(unique(pkgs)), collapse = " ")
          cat("Extracted packages:", result, "\n")
          cat(sprintf("packages=%s\n", result), file = Sys.getenv("GITHUB_OUTPUT"), append = TRUE)

  render:
    needs: prepare
    uses: ./.github/workflows/rerender-and-pr.yml
    secrets: inherit
    with:
      pages: ${{ github.event.inputs.pages }}
      packages: ${{ needs.prepare.outputs.packages }}
      cache-key-suffix: pages
      pr-title: "Re-render pages ${{ needs.prepare.outputs.date }}"
      pr-context: "Manually triggered re-render."
      issue-title: "Manual re-render failed ${{ needs.prepare.outputs.date }}"
      issue-body: |
        A manually triggered re-render failed.

        **Pages:** ${{ github.event.inputs.pages }}
