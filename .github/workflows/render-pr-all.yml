on:
  issue_comment:
    types: [created]

name: Render all PR pages

jobs:
  render:
    if: >
      github.event.issue.pull_request != null &&
      github.event.comment.body == '/render-all' &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Get PR info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('branch', pr.data.head.ref);

      - name: React to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - name: Set up render environment
        uses: ./.github/actions/setup-render
        with:
          packages: "--all"
          cache-key-suffix: pr-all-${{ steps.pr.outputs.branch }}

      - name: Install all packages
        run: Rscript R/installs.R

      - name: Render all pages
        id: render
        run: Rscript R/re-render.R

      - name: Commit rendered output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _freeze/ $(find . -name "*.md" -not -path "./.git/*")
          git diff --cached --quiet && echo "Nothing to commit" || \
            git commit -m "render all pages [skip ci]" && git push

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ steps.render.outcome }}' === 'success';
            const body = success
              ? `**Render complete** :white_check_mark:\n\nAll pages have been rendered and committed to this branch.`
              : `**Render failed** :x:\n\nCheck the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
