project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "!STYLING.md"
  resources:
    - "learn/work/tune-svm/ionosphere.csv"
    - "learn/models/sub-sampling/imbal_data.csv"
    - "start/case-study/hotels.csv"
    - "start/models/urchins.csv"
    - "images/*.webp"
    - "fonts/*.woff2"
    - "about/surveys/**/index.html"
    - "about/surveys/**/*.png"
    - "about/surveys/**/*.svg"
    - "about/surveys/**/*.csv"

profile:
  default: local

execute:
  freeze: auto
  keep-md: true

website:
  title: "tidymodels"
  navbar:
    pinned: true
    right:
      - text: "Packages"
        href: packages/index.qmd
      - text: "Get Started"
        href: start/index.qmd
      - text: "Learn"
        href: learn/index.qmd
      - text: "Help"
        href: help/index.qmd
      - text: "Contribute"
        href: contribute/index.qmd
      - text: "About"
        href: about/index.qmd
      - text: "Find"
        href: find/index.qmd
      # GitHub icon: inlined SVG (Bootstrap Icons "github" path) instead of `icon: github`,
      # so the front page does not pull in any <i class="bi"> elements. The bootstrap-icons
      # CSS link is still injected by Quarto unconditionally, but with no `bi-*` element on
      # the page the heavy bootstrap-icons.woff font file is not fetched.
      - text: |
          <svg class="icon-inline" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
        href: https://github.com/tidymodels/
        aria-label: GitHub

  sidebar:
    - id: get-started
      style: "floating"
      contents:
        - text: "GET STARTED"
          href: start/index.qmd
        - text: "Build a model"
          href: start/models/index.qmd
        - text: "Preprocess your data with recipes"
          href: start/recipes/index.qmd
        - text: "Evaluate your model with resamples"
          href: start/resampling/index.qmd
        - text: "Tune model parameters"
          href: start/tuning/index.qmd
        - text: "A predictive modeling case study"
          href: start/case-study/index.qmd
    - id: learn
      collapse-level: 1
      contents:
        - text: "Learn"
          href: learn/index.qmd
        - section: "Perform Statistical Analyses"
          contents: learn/statistics/*/index.qmd
        - section: "Create Robust Models"
          contents: learn/models/*/index.qmd
        - section: "Develop custom modeling tools"
          contents: learn/develop/*/index.qmd
        - section: "Tune, compare, and work with your models"
          contents: learn/work/*/index.qmd

  page-footer:
    left: |
      Proudly supported by
      [![](/images/Posit-Logos-2024_horiz-full-color.svg){fig-alt="Posit" width=65px}](https://posit.co)
    right: |
      <a onclick="window.scrollTo({ top: 0, behavior: 'smooth' }); return false;" role="button" aria-label="Back to top">
         <!-- icon: fa-chevron-up (Font Awesome Free 6 Solid) — inlined SVG instead of the Quarto fa shortcode so we don't pull in FA's CSS / 154 KB woff2 -->
         <svg class="icon-inline" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" aria-hidden="true"><!--! Font Awesome Free 6.7.2 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free (Icons: CC BY 4.0, Fonts: SIL OFL 1.1, Code: MIT License) Copyright 2024 Fonticons, Inc. --><path d="M233.4 105.4c12.5-12.5 32.8-12.5 45.3 0l192 192c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L256 173.3 86.6 342.6c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3l192-192z"/></svg>
      </a>
  repo-url: https://github.com/tidymodels/tidymodels.org
  repo-actions: [edit, issue]
  favicon: images/favicons/favicon.ico

format:
  html:
    quarto-required: ">= 1.3.353"
    toc: true
    linestretch: 1.6
    include-after-body: html/plausible.html
    code-link: true
    css: fonts/fonts.css
    grid:
      body-width: 840px

theme:
  - cosmo
  - styles.scss
  - styles-frontpage.scss
